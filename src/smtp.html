<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SMTP Settings</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      margin: 0;
      padding: 20px;
      color: #1f2933;
      background: #f7f8fa;
    }

    h1 {
      font-size: 18px;
      margin: 0 0 14px;
    }

    label {
      display: block;
      font-size: 13px;
      font-weight: 600;
      margin: 12px 0 6px;
    }

    input {
      box-sizing: border-box;
      width: 100%;
      border: 1px solid #b8c1cc;
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 14px;
      background: white;
    }

    .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    .checkbox {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 14px;
      font-size: 13px;
      font-weight: 600;
    }

    .checkbox input {
      width: auto;
    }

    .actions {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-top: 20px;
    }

    button {
      border: 1px solid #9aa5b1;
      border-radius: 6px;
      padding: 7px 14px;
      font-size: 13px;
      background: white;
    }

    button.primary {
      border-color: #1264a3;
      background: #1264a3;
      color: white;
    }
  </style>
</head>
<body>
  <h1>SMTP Settings</h1>
  <label for="host">SMTP host</label>
  <input id="host" autocomplete="off">

  <div class="row">
    <div>
      <label for="port">Port</label>
      <input id="port" type="number" min="1" max="65535">
    </div>
    <label class="checkbox">
      <input id="secure" type="checkbox">
      Use SSL/TLS
    </label>
  </div>

  <label for="user">Username</label>
  <input id="user" autocomplete="username">

  <label for="pass">Password</label>
  <input id="pass" type="password" autocomplete="current-password">

  <label for="from">From address</label>
  <input id="from" autocomplete="email">

  <div class="actions">
    <button id="cancel">Cancel</button>
    <button id="save" class="primary">Save</button>
  </div>

  <script>
    const fields = {
      host: document.getElementById('host'),
      port: document.getElementById('port'),
      secure: document.getElementById('secure'),
      user: document.getElementById('user'),
      pass: document.getElementById('pass'),
      from: document.getElementById('from')
    };

    window.smtpSettings.load().then((settings) => {
      fields.host.value = settings.host || '';
      fields.port.value = settings.port || 587;
      fields.secure.checked = Boolean(settings.secure);
      fields.user.value = settings.user || '';
      fields.pass.value = settings.pass || '';
      fields.from.value = settings.from || '';
    });

    document.getElementById('save').addEventListener('click', async () => {
      await window.smtpSettings.save({
        host: fields.host.value,
        port: Number(fields.port.value || 587),
        secure: fields.secure.checked,
        user: fields.user.value,
        pass: fields.pass.value,
        from: fields.from.value
      });
      window.close();
    });

    document.getElementById('cancel').addEventListener('click', () => {
      window.close();
    });
  </script>
</body>
</html>
